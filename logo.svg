<svg width="220" height="56" viewBox="0 0 220 56" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="gradStroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
  </defs>

  <!-- Triangle outline -->
  <polygon
    points="28,4 54,50 2,50"
    fill="none"
    stroke="url(#grad)"
    stroke-width="3"
    stroke-linejoin="round"
    stroke-linecap="round"
  />

  <!-- Inner neural network nodes -->
  <circle cx="28" cy="20" r="3" fill="url(#grad)"/>
  <circle cx="18" cy="40" r="2.2" fill="url(#grad)" opacity="0.75"/>
  <circle cx="38" cy="40" r="2.2" fill="url(#grad)" opacity="0.75"/>
  <circle cx="28" cy="40" r="1.8" fill="url(#grad)" opacity="0.5"/>

  <!-- Connector lines -->
  <line x1="28" y1="20" x2="18" y2="40" stroke="url(#grad)" stroke-width="1.2" opacity="0.45"/>
  <line x1="28" y1="20" x2="38" y2="40" stroke="url(#grad)" stroke-width="1.2" opacity="0.45"/>
  <line x1="28" y1="20" x2="28" y2="40" stroke="url(#grad)" stroke-width="1.2" opacity="0.3"/>
  <line x1="18" y1="40" x2="38" y2="40" stroke="url(#grad)" stroke-width="1.2" opacity="0.3"/>

  <!-- Wordmark -->
  <text
    x="70"
    y="30"
    font-family="Outfit, -apple-system, BlinkMacSystemFont, sans-serif"
    font-size="20"
    font-weight="800"
    letter-spacing="-0.5"
    fill="white"
  >Inference</text>
  <text
    x="71"
    y="48"
    font-family="Outfit, -apple-system, BlinkMacSystemFont, sans-serif"
    font-size="12"
    font-weight="600"
    letter-spacing="4"
    fill="#94a3b8"
  >AGENTS</text>
</svg>
