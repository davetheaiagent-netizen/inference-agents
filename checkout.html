<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout | Inference Agents</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles-dark.css">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .checkout-container {
      background: var(--bg-card);
      border-radius: 16px;
      padding: 40px;
      max-width: 500px;
      width: 100%;
      border: 1px solid var(--border);
    }
    h1 { color: var(--primary); margin-bottom: 10px; }
    .product-name { font-size: 24px; font-weight: bold; margin-bottom: 5px; }
    .product-price {
      font-size: 36px;
      font-weight: bold;
      margin: 20px 0;
      background: linear-gradient(135deg, var(--primary-light), var(--accent-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .product-price span { font-size: 16px; color: var(--text-muted); -webkit-text-fill-color: var(--text-muted); }
    .features {
      background: rgba(255,255,255,0.03);
      padding: 20px;
      border-radius: 8px;
      margin: 20px 0;
      border: 1px solid var(--border);
    }
    .features li { margin: 10px 0; list-style: none; }
    .features li::before { content: "✓"; color: var(--accent); margin-right: 10px; }
    input {
      width: 100%;
      padding: 13px 16px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.05);
      color: var(--text);
      font-size: 16px;
      margin-bottom: 15px;
    }
    input:focus { outline: none; border-color: var(--border-accent); }
    .btn {
      width: 100%;
      padding: 16px;
      font-size: 18px;
      font-weight: bold;
      border: none;
      cursor: pointer;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .security {
      text-align: center;
      color: var(--text-muted);
      font-size: 12px;
      margin-top: 20px;
    }
    .error { color: #ff4444; margin-bottom: 15px; }
    .success { color: var(--accent); margin-bottom: 15px; }
  </style>
  <script src="https://js.stripe.com/v3/"></script>
</head>
<body>
  <div class="checkout-container">
    <h1>🛒 Checkout</h1>
    <div id="error" class="error"></div>
    <div id="success" class="success"></div>

    <div id="product-details">
      <div class="product-name" id="productName">Loading...</div>
      <div class="product-price" id="productPrice">$--</div>
    </div>

    <form id="checkout-form">
      <input type="text" id="name" placeholder="Your Name" required>
      <input type="email" id="email" placeholder="Email Address" required>
      <input type="text" placeholder="Card Number" id="card-number" required>
      <div style="display: flex; gap: 10px;">
        <input type="text" placeholder="MM/YY" id="card-expiry" style="flex: 1;" required>
        <input type="text" placeholder="CVC" id="card-cvc" style="flex: 1;" required>
      </div>
      <button type="submit" class="btn" id="submit-btn">Pay Now</button>
    </form>

    <p class="security">🔒 Secure payment powered by Stripe</p>
  </div>

  <script>
    const products = {
      'starter-pack': { name: 'AI Agent Army Starter Pack', price: 4900 },
      'crypto-agent': { name: 'Crypto Trading Agent', price: 7900 },
      'social-bundle': { name: 'Social Media Bundle', price: 3900 }
    };

    const urlParams = new URLSearchParams(window.location.search);
    const productId = urlParams.get('product') || 'starter-pack';
    const product = products[productId];

    if (product) {
      document.getElementById('productName').textContent = product.name;
      document.getElementById('productPrice').innerHTML = '$' + (product.price / 100) + ' <span>USD</span>';
    }

    // Initialize Stripe (replace with your publishable key)
    const stripe = Stripe('pk_test_YOUR_PUBLISHABLE_KEY');

    document.getElementById('checkout-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      const errorDiv = document.getElementById('error');
      const successDiv = document.getElementById('success');

      btn.disabled = true;
      btn.textContent = 'Processing...';
      errorDiv.textContent = '';
      successDiv.textContent = '';

      // In production, you would create a payment intent on your server
      // For demo, we'll show success after validation
      await new Promise(r => setTimeout(r, 1500));

      successDiv.textContent = '✅ Payment successful! Check your email for download instructions.';
      btn.textContent = 'Paid!';

      // Save to localStorage for demo
      const order = {
        product: product.name,
        email: document.getElementById('email').value,
        name: document.getElementById('name').value,
        amount: product.price,
        date: new Date().toISOString()
      };

      const orders = JSON.parse(localStorage.getItem('orders') || '[]');
      orders.push(order);
      localStorage.setItem('orders', JSON.stringify(orders));
    });
  </script>

  <script>
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) { entry.target.classList.add('visible'); observer.unobserve(entry.target); }
      });
    }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });
    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
  </script>
</body>
</html>
